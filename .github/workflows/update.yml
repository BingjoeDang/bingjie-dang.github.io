name: Update Google Scholar Citations

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 00:00 自动运行一次
  workflow_dispatch: # 保留这个，方便我们现在手动点击运行测试

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run python script
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python update_citations.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add citations.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update citations via SerpApi" && git push)
